<!DOCTYPE html>
<html>
<head>
    <title>Tech Dashboard</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f1f5f9;
            margin: 0;
            padding: 30px;
        }

        h2 {
            margin-bottom: 20px;
            color: #0f172a;
        }

        /* CARD CONTAINER */
        .card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        /* CONTROLS */
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        input {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            width: 250px;
        }

        input:focus {
            outline: none;
            border-color: #8C0000;
            box-shadow: 0 0 0 2px rgba(140,0,0,0.2);
        }

        button {
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            opacity: 0.9;
        }

        .refresh-btn {
            background: #2563eb;
            color: white;
        }

        .toggle-btn {
            background: #6b7280;
            color: white;
        }

        .export-btn {
            background: #16a34a;
            color: white;
        }

        .delete-btn {
            background: #dc2626;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .delete-btn:hover {
            background: #b91c1c;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 12px;
        }

        thead {
            background: #8C0000;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        tbody tr {
            border-bottom: 1px solid #e5e7eb;
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #f9fafb;
        }

        /* STATUS COLORS */
        select {
            padding: 6px;
            border-radius: 6px;
            font-weight: bold;
            border: 1px solid #ccc;
        }

        .Pending {
            background: #ffe5e5;
        }

        .InProgress {
            background: #fff4cc;
        }

        .Fixed {
            background: #e0ffe0;
        }

        /* RESPONSIVE */
        @media (max-width: 800px) {
            body {
                padding: 15px;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            input {
                width: 100%;
            }

            table {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

<h2>Tech Help Dashboard</h2>

<div class="card">

    <div class="controls">
        <input type="text" id="search" placeholder="Search..." onkeyup="renderTable()">

        <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
        <button class="toggle-btn" onclick="toggleFixed()">Hide/Show Fixed</button>
        <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Ticket</th>
                <th>Name</th>
                <th>Student ID</th>
                <th>Serial</th>
                <th>Issue</th>
                <th>Time</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="table"></tbody>
    </table>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwjd3ReMY2PawoIZEzccmLbB9voitWjAg7WdKFjMFXyE8k29vuuYVWma1Dz-SxUwRw/exec";

let tickets = [];
let hideFixed = false;

function loadData() {
    fetch(API_URL)
        .then(res => res.json())
        .then(data => {
            tickets = data.reverse();
            renderTable();
        });
}

function renderTable() {
    let search = document.getElementById("search").value.toLowerCase();
    let tbody = document.getElementById("table");
    tbody.innerHTML = "";

    tickets.forEach(t => {

        if (hideFixed && t.Status === "Fixed") return;
        if (!JSON.stringify(t).toLowerCase().includes(search)) return;

        let row = document.createElement("tr");
        let statusClass = (t.Status || "").replace(" ", "");

        row.classList.add(statusClass);

        row.innerHTML = `
            <td>${t.Ticket}</td>
            <td>${t["First Name"] || ""} ${t["Last Name"] || ""}</td>
            <td>${t["Student ID"] || ""}</td>
            <td>${t.Serial || ""}</td>
            <td>${t.Issue || ""}</td>
            <td>${t.Timestamp ? new Date(t.Timestamp).toLocaleString() : ""}</td>

            <td>
                <select onchange="updateStatus('${t.Ticket}', this.value)">
                    <option ${t.Status === "Pending" ? "selected" : ""}>Pending</option>
                    <option ${t.Status === "In Progress" ? "selected" : ""}>In Progress</option>
                    <option ${t.Status === "Fixed" ? "selected" : ""}>Fixed</option>
                </select>
            </td>

            <td>
                <button class="delete-btn" onclick="deleteTicket('${t.Ticket}')">
                    Delete
                </button>
            </td>
        `;

        tbody.appendChild(row);
    });
}

function updateStatus(ticket, status) {

    const data = new URLSearchParams();
    data.append("update", "true");
    data.append("ticket", ticket);
    data.append("status", status);

    fetch(API_URL, {
        method: "POST",
        body: data,
        mode: "no-cors"
    });
}

function deleteTicket(ticket) {

    if (!confirm("Delete this ticket permanently?")) return;

    const data = new URLSearchParams();
    data.append("delete", "true");
    data.append("ticket", ticket);

    fetch(API_URL, {
        method: "POST",
        body: data,
        mode: "no-cors"
    });

    setTimeout(loadData, 800);
}

function toggleFixed() {
    hideFixed = !hideFixed;
    renderTable();
}

function exportCSV() {

    let csv = [];

    csv.push([
        "Ticket","First Name","Last Name","Student ID",
        "Serial","Issue","Timestamp","Status"
    ].join(","));

    tickets.forEach(t => {
        csv.push([
            t.Ticket || "",
            t["First Name"] || "",
            t["Last Name"] || "",
            t["Student ID"] || "",
            t.Serial || "",
            `"${(t.Issue || "").replace(/"/g,'""')}"`,
            t.Timestamp || "",
            t.Status || ""
        ].join(","));
    });

    const blob = new Blob([csv.join("\n")], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = `tech_tickets_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();

    URL.revokeObjectURL(url);
}

setInterval(loadData, 5000);
loadData();

</script>

</body>
</html>
